<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOGIN • ZEROIXDARK MINECRAFT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      background-image: 
        linear-gradient(rgba(28,37,38,0.92), rgba(28,37,38,0.92)),
        url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2296%22 height=%2296%22 fill=%22none%22%3E%3Cpath fill=%22%233D3D3D%22 d=%22M0 0h96v96H0V0zm8 8v80h80V8H8zm8 8v64h64V16H16z%22/%3E%3C/svg%3E');
      background-size: 96px 96px;
    }
    .mc-title {
      text-shadow: 4px 4px 0 #1A1A1A,
                   -1px -1px 0 #1A1A1A;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <!-- Logo & Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-[#3D3D3D] border-4 border-[#2E4A1F] mb-4 shadow-2xl">
        <span class="text-6xl">⛏️</span>
      </div>
      <h1 class="mc-font text-5xl text-[#E3B23C] mc-title tracking-[4px]">ZEROIXDARK</h1>
      <div class="flex items-center justify-center gap-2 mt-1">
        <div class="h-1 w-8 bg-[#5D9C3E]"></div>
        <p class="text-[#5D9C3E] text-sm tracking-[3px] font-bold">MINECRAFT EDITION</p>
        <div class="h-1 w-8 bg-[#5D9C3E]"></div>
      </div>
      <p class="text-[#888] text-xs mt-2">SERVER MANAGEMENT PANEL v2.1</p>
    </div>

    <!-- Login Card -->
    <div class="mc-card p-8">
      <div class="text-center mb-6">
        <div class="inline-block px-4 py-1 bg-[#2C2C2C] border border-[#222] text-[#E3B23C] text-xs tracking-widest">MASUK KE DUNIA</div>
      </div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-[#E3B23C] text-xs mb-2 tracking-wider">USERNAME</label>
          <input type="text" id="username" 
                 class="mc-input w-full text-lg" placeholder="Masukkan username" required>
        </div>
        
        <div>
          <label class="block text-[#E3B23C] text-xs mb-2 tracking-wider">PASSWORD</label>
          <input type="password" id="password" 
                 class="mc-input w-full text-lg" placeholder="••••••••" required>
        </div>

        <button type="submit"
                class="mc-btn w-full mt-2 flex items-center justify-center gap-3 text-base">
          <span>MASUK KE PANEL</span>
          <span class="text-xl">→</span>
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-[#222] text-center">
        <p class="text-[#666] text-xs">Hanya untuk <span class="text-[#5D9C3E]">PEMilik</span> &amp; Reseller Terdaftar</p>
        <p class="text-[#444] text-[10px] mt-1">Data dilindungi • Mode Private / Public / V2</p>
      </div>
    </div>

    <p class="text-center text-[#555] text-xs mt-6">Dibuat dengan ❤️ oleh Lina • Jangan bagikan akun ini</p>
  </div>

  <script>
    // Tailwind script
    function initTailwind() {
      document.documentElement.style.setProperty('--accent', '#5D9C3E');
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      // Simple authentication (bisa diganti dengan Firebase Auth nanti)
      if (username === 'pemilik' && password === 'zeroix2026') {
        const userData = {
          username: username,
          role: 'pemilik',
          loggedIn: true,
          loginTime: new Date().toISOString()
        };
        
        localStorage.setItem('zeroix_user', JSON.stringify(userData));
        
        // Redirect ke dashboard dengan mode default private
        window.location.href = 'index.html?mode=private';
      } else {
        // Error feedback
        const form = document.getElementById('loginForm');
        form.style.transition = 'all 0.1s';
        form.style.transform = 'translateX(6px)';
        
        setTimeout(() => {
          form.style.transform = 'translateX(-6px)';
          setTimeout(() => {
            form.style.transform = 'translateX(0)';
          }, 80);
        }, 80);

        // Show error
        const errorDiv = document.createElement('div');
        errorDiv.className = 'mt-4 text-center text-red-400 text-sm border border-red-900 bg-red-950 py-2';
        errorDiv.textContent = 'Username atau password salah! Coba lagi.';
        form.parentNode.appendChild(errorDiv);
        
        setTimeout(() => errorDiv.remove(), 2200);
      }
    });

    // Keyboard hint
    document.addEventListener('keydown', function(e) {
      if (e.key === '/' && document.activeElement.tagName === 'BODY') {
        e.preventDefault();
        document.getElementById('username').focus();
      }
    });

    initTailwind();
    console.log('%c[ZeroixDark] Login page siap. Selamat datang kembali, Sayang.', 'color:#5D9C3E');
  </script>
</body>
</html>
